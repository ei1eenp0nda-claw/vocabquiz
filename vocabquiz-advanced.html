<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VocabQuiz Advanced - 智能词汇出题（高级版）</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .upload-area {
            border: 3px dashed #ccc;
            border-radius: 12px;
            padding: 50px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #fafafa;
        }
        .upload-area:hover, .upload-area.dragover {
            border-color: #667eea;
            background: #f0f4ff;
        }
        .upload-area.pasted {
            border-color: #10b981;
            background: #ecfdf5;
        }
        .upload-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
        .upload-text {
            color: #666;
            font-size: 16px;
            margin-bottom: 8px;
        }
        .upload-hint {
            color: #999;
            font-size: 13px;
        }
        .preview-image {
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }
        .config-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }
        .config-item {
            display: flex;
            flex-direction: column;
        }
        .config-item.full-width {
            grid-column: 1 / -1;
        }
        label {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
            font-size: 14px;
        }
        input, select, textarea {
            padding: 10px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        textarea {
            font-family: monospace;
            resize: vertical;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .btn-secondary {
            background: #f3f4f6;
            color: #333;
        }
        .btn-secondary:hover {
            background: #e5e7eb;
        }
        .btn-small {
            padding: 6px 12px;
            font-size: 13px;
        }
        .actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        .loading {
            display: none;
            text-align: center;
            padding: 30px;
        }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px;
            border-radius: 8px;
            margin-top: 12px;
            display: none;
            font-size: 14px;
        }
        .success {
            background: #d1fae5;
            color: #059669;
            padding: 12px;
            border-radius: 8px;
            margin-top: 12px;
            display: none;
            font-size: 14px;
        }
        .vocab-section {
            margin-top: 15px;
        }
        .vocab-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 10px 0;
        }
        .vocab-tag {
            background: #e0e7ff;
            color: #4338ca;
            padding: 5px 12px;
            border-radius: 16px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .vocab-tag .remove {
            cursor: pointer;
            font-weight: bold;
            font-size: 18px;
            color: #dc2626;
            background: rgba(220, 38, 38, 0.1);
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            transition: all 0.2s;
            position: relative;
        }
        .vocab-tag .remove:hover {
            background: #dc2626;
            color: white;
            transform: scale(1.1);
        }
        .vocab-tag .remove::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: normal;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s;
            pointer-events: none;
        }
        .vocab-tag .remove:hover::after {
            opacity: 1;
            visibility: visible;
        }
        .add-vocab-box {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            padding: 15px;
            background: #f8fafc;
            border: 2px dashed #cbd5e1;
            border-radius: 12px;
        }
        .add-vocab-box input {
            flex: 1;
            border: 2px solid #94a3b8;
            background: white;
            font-size: 15px;
            padding: 12px 15px;
        }
        .add-vocab-box input::placeholder {
            color: #64748b;
            font-size: 14px;
        }
        .add-vocab-box input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .add-vocab-box .btn {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
        }
        .add-vocab-box .btn:hover {
            background: linear-gradient(135deg, #059669 0%, #047857 100%);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
        }
        .vocab-section-title {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 12px;
            padding: 8px 12px;
            background: #f1f5f9;
            border-radius: 6px;
            border-left: 3px solid #667eea;
        }
        .vocab-count {
            font-size: 14px;
            color: #667eea;
            font-weight: 600;
            margin-left: 10px;
        }
        .add-vocab-hint {
            font-size: 13px;
            color: #64748b;
            margin-top: 8px;
            text-align: center;
        }
        .result-box {
            margin-top: 20px;
        }
        .result-textarea {
            width: 100%;
            min-height: 200px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: monospace;
            font-size: 14px;
            line-height: 1.6;
            background: #fafafa;
        }
        .copy-btn {
            margin-top: 10px;
            background: #10b981;
        }
        .copy-btn:hover {
            background: #059669;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
        }
        .hidden { display: none !important; }
        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
        }
        .step {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #999;
            font-size: 14px;
        }
        .step.active {
            color: #667eea;
            font-weight: 600;
        }
        .step.completed {
            color: #10b981;
        }
        .step-num {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }
        .step.active .step-num {
            background: #667eea;
            color: white;
        }
        .step.completed .step-num {
            background: #10b981;
            color: white;
        }
        h3 {
            margin-bottom: 12px;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 VocabQuiz</h1>
        
        <div class="card step-indicator">
            <div class="step active" id="step1">
                <div class="step-num">1</div>
                <span>上传图片</span>
            </div>
            <div class="step" id="step2">
                <div class="step-num">2</div>
                <span>提取词汇</span>
            </div>
            <div class="step" id="step3">
                <div class="step-num">3</div>
                <span>生成题目</span>
            </div>
        </div>

        <div class="card">
            <h3>⚙️ API 配置</h3>
            <div class="config-section">
                <div class="config-item full-width">
                    <label>豆包 API Key</label>
                    <input type="password" id="apiKey" placeholder="输入你的豆包 API Key">
                </div>
                <div class="config-item">
                    <label>模型（OCR）</label>
                    <select id="visionModel">
                        <option value="doubao-seed-1-6-vision-250815">doubao-vision</option>
                    </select>
                </div>
                <div class="config-item">
                    <label>模型（生成）</label>
                    <select id="llmModel">
                        <option value="doubao-seed-1.8">doubao-seed-1.8</option>
                    </select>
                </div>
            </div>
            <p style="font-size: 12px; color: #999;">
                💡 提示：在 <a href="https://console.volcengine.com/ark/" target="_blank">火山引擎</a> 获取 API Key
            </p>
        </div>

        <div class="card" id="uploadCard">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📋</div>
                <div class="upload-text">粘贴或点击上传图片</div>
                <div class="upload-hint">支持 Ctrl+V 粘贴截图，或拖拽图片到此处</div>
                <input type="file" id="fileInput" accept="image/*" style="display: none;">
            </div>
            <img id="previewImage" class="preview-image" alt="预览">
            <div id="uploadError" class="error"></div>
            <div id="uploadSuccess" class="success"></div>
            
            <div class="actions">
                <button class="btn" id="extractBtn" disabled>🔍 提取词汇</button>
                <button class="btn btn-secondary hidden" id="resetBtn">🔄 重新上传</button>
            </div>
        </div>

        <div class="card hidden" id="vocabCard">
            <h3>📚 识别到的词汇 <span class="vocab-count" id="vocabCount">共 0 个词汇</span></h3>
            <div class="vocab-section-title">
                💡 点击下方词汇可删除，使用下方输入框可添加新词
            </div>
            <div class="vocab-list" id="vocabList"></div>
            
            <div class="add-vocab-box">
                <input type="text" id="addVocabInput" placeholder="输入要添加的英文单词或词组...">
                <button class="btn btn-small" id="addVocabBtn">➕ 添加词汇</button>
            </div>
            <div class="add-vocab-hint">✏️ 如有遗漏词汇，可手动添加</div>
            
            <div style="margin-top: 15px;">
                <label>难度选择</label>
                <select id="difficulty" style="margin-top: 5px; width: 100%;">
                    <option value="easy">初中水平</option>
                    <option value="medium" selected>高中水平（高考）</option>
                    <option value="hard">四级以上</option>
                </select>
            </div>
            
            <div class="actions">
                <button class="btn" id="generateBtn">✨ 生成练习题</button>
            </div>
        </div>

        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <div id="loadingText">正在处理...</div>
        </div>

        <div class="card hidden" id="quizCard">
            <h3>📝 练习题</h3>
            <div class="result-box">
                <textarea class="result-textarea" id="quizText" readonly></textarea>
                <button class="btn copy-btn" id="copyQuizBtn">📋 复制题目</button>
            </div>
            
            <h3 style="margin-top: 25px;">📖 参考答案</h3>
            <div class="result-box">
                <textarea class="result-textarea" id="answerText" readonly></textarea>
                <button class="btn copy-btn" id="copyAnswerBtn">📋 复制答案</button>
            </div>
            
            <div class="actions" style="margin-top: 25px;">
                <button class="btn" id="newQuizBtn">🔄 重新生成</button>
                <button class="btn btn-secondary" id="startOverBtn">🏠 重新开始</button>
            </div>
        </div>
    </div>

    <script>
        let currentImage = null;
        let extractedVocab = [];

        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const previewImage = document.getElementById('previewImage');
        const extractBtn = document.getElementById('extractBtn');
        const resetBtn = document.getElementById('resetBtn');
        const vocabCard = document.getElementById('vocabCard');
        const vocabList = document.getElementById('vocabList');
        const addVocabInput = document.getElementById('addVocabInput');
        const addVocabBtn = document.getElementById('addVocabBtn');
        const generateBtn = document.getElementById('generateBtn');
        const quizCard = document.getElementById('quizCard');
        const quizText = document.getElementById('quizText');
        const answerText = document.getElementById('answerText');
        const loading = document.getElementById('loading');
        const loadingText = document.getElementById('loadingText');

        uploadArea.addEventListener('click', () => fileInput.click());
        
        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) handleImage(e.target.files[0]);
        });

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file?.type.startsWith('image/')) handleImage(file);
        });

        document.addEventListener('paste', (e) => {
            const items = e.clipboardData.items;
            for (let item of items) {
                if (item.type.startsWith('image/')) {
                    handleImage(item.getAsFile());
                    uploadArea.classList.add('pasted');
                    setTimeout(() => uploadArea.classList.remove('pasted'), 800);
                    break;
                }
            }
        });

        function handleImage(file) {
            currentImage = file;
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImage.src = e.target.result;
                previewImage.style.display = 'block';
                extractBtn.disabled = false;
                resetBtn.classList.remove('hidden');
                showSuccess('uploadSuccess', '图片已加载');
            };
            reader.readAsDataURL(file);
        }

        resetBtn.addEventListener('click', () => {
            currentImage = null;
            previewImage.src = '';
            previewImage.style.display = 'none';
            extractBtn.disabled = true;
            resetBtn.classList.add('hidden');
            hideError('uploadError');
            hideSuccess('uploadSuccess');
        });

        extractBtn.addEventListener('click', async () => {
            const apiKey = document.getElementById('apiKey').value.trim();
            if (!apiKey) {
                showError('uploadError', '请先填写 API Key');
                return;
            }

            showLoading('正在识别图片中的词汇...');
            
            try {
                const base64Image = await fileToBase64(currentImage);
                const vocab = await extractVocab(base64Image, apiKey);
                
                extractedVocab = vocab;
                renderVocabList();
                
                vocabCard.classList.remove('hidden');
                updateStep(2);
                vocabCard.scrollIntoView({ behavior: 'smooth' });
            } catch (err) {
                showError('uploadError', err.message);
            } finally {
                hideLoading();
            }
        });

        // 添加词汇
        function addVocab(word) {
            word = word.trim();
            if (!word) return;
            if (extractedVocab.includes(word)) {
                alert('该词汇已存在');
                return;
            }
            extractedVocab.push(word);
            renderVocabList();
            addVocabInput.value = '';
        }

        // 删除词汇
        function removeVocab(index) {
            extractedVocab.splice(index, 1);
            renderVocabList();
        }

        addVocabBtn.addEventListener('click', () => {
            addVocab(addVocabInput.value);
        });

        addVocabInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                addVocab(addVocabInput.value);
            }
        });

        function renderVocabList() {
            vocabList.innerHTML = extractedVocab.map((v, i) => 
                `<span class="vocab-tag">${escapeHtml(v)}<span class="remove" onclick="removeVocab(${i})" data-tooltip="点击删除">×</span></span>`
            ).join('');
            
            // 更新词汇数量统计
            document.getElementById('vocabCount').textContent = `共 ${extractedVocab.length} 个词汇`;
        }

        generateBtn.addEventListener('click', async () => {
            const apiKey = document.getElementById('apiKey').value.trim();
            const difficulty = document.getElementById('difficulty').value;
            
            if (extractedVocab.length === 0) {
                alert('没有可生成题目的词汇');
                return;
            }

            showLoading('正在生成练习题...');
            
            try {
                const quiz = await generateQuiz(extractedVocab, difficulty, apiKey);
                renderQuiz(quiz);
                
                quizCard.classList.remove('hidden');
                updateStep(3);
                quizCard.scrollIntoView({ behavior: 'smooth' });
            } catch (err) {
                alert('生成失败: ' + err.message);
            } finally {
                hideLoading();
            }
        });

        document.getElementById('copyQuizBtn').addEventListener('click', () => {
            quizText.select();
            document.execCommand('copy');
            alert('题目已复制到剪贴板');
        });

        document.getElementById('copyAnswerBtn').addEventListener('click', () => {
            answerText.select();
            document.execCommand('copy');
            alert('答案已复制到剪贴板');
        });

        document.getElementById('newQuizBtn').addEventListener('click', () => {
            generateBtn.click();
        });

        document.getElementById('startOverBtn').addEventListener('click', () => {
            location.reload();
        });

        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        async function extractVocab(base64Image, apiKey) {
            const cleanApiKey = apiKey.replace(/[^\x00-\x7F]/g, '').trim();
            const response = await fetch('https://ark.cn-beijing.volces.com/api/v3/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${cleanApiKey}`
                },
                body: JSON.stringify({
                    model: document.getElementById('visionModel').value,
                    messages: [
                        { role: 'system', content: '你是一个OCR识别专家，专门识别图片中加粗的英文词汇。' },
                        { role: 'user', content: [
                            { type: 'text', text: '找出图片中所有加粗的英文单词和词组，返回JSON数组格式：["word1", "word2", ...]。只返回JSON数组，不要有其他文字。' },
                            { type: 'image_url', image_url: { url: `data:image/png;base64,${base64Image}` } }
                        ]}
                    ],
                    temperature: 0.1
                })
            });

            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error?.message || 'API 请求失败');
            }

            const data = await response.json();
            const content = data.choices[0].message.content;
            const match = content.match(/\[[\s\S]*?\]/);
            if (match) return JSON.parse(match[0]);
            throw new Error('无法解析词汇列表');
        }

        async function generateQuiz(vocabList, difficulty, apiKey) {
            const vocabStr = vocabList.join(', ');
            const difficultyDesc = { easy: '初中', medium: '高考', hard: '四级以上' }[difficulty];
            const vocabCount = vocabList.length;
            
            // 动态计算各题型数量
            const cnToEnCount = Math.min(3, Math.max(2, Math.floor(vocabCount * 0.25))); // 中→英: 2-3道
            const enToCnCount = Math.min(3, Math.max(2, Math.floor(vocabCount * 0.25))); // 英→中: 2-3道
            const noHintCount = 1; // 无提示填空: 1道
            const prototypeCount = Math.min(2, Math.max(1, Math.floor(vocabCount * 0.15))); // 原型填空: 1-2道
            const inflectionCount = Math.max(0, vocabCount - cnToEnCount - enToCnCount - noHintCount - prototypeCount); // 变形填空: 剩余全部
            const totalCount = cnToEnCount + enToCnCount + noHintCount + prototypeCount + inflectionCount;

            const prompt = `基于以下${vocabCount}个词汇出英语练习题：${vocabStr}
难度：${difficultyDesc}

【词性筛选规则 - 非常重要】
1. 首先识别每个词汇的词性
2. **如果是名词（n.），绝对跳过，不要出题** 
3. **只从以下词性中选词出题：**
   - 动词（v.）
   - 形容词（adj.）
   - 副词（adv.）
4. 如果词汇表中的词大部分是名词，请优先选择其中的动词、形容词、副词出题

题目数量动态分配（共${totalCount}题）：
1. 中译英翻译题：${cnToEnCount}道（给出中文词组，让用户写英文单词）
2. 英译中翻译题：${enToCnCount}道（给出英文单词，让用户写中文意思）

            const cleanApiKey = apiKey.replace(/[^\x00-\x7F]/g, '').trim();
            const response = await fetch('https://ark.cn-beijing.volces.com/api/v3/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${cleanApiKey}`
                },
                body: JSON.stringify({
                    model: document.getElementById('llmModel').value,
                    messages: [
                        { role: 'system', content: '你是一个专业的英语教师，擅长出高质量的练习题。' },
                        { role: 'user', content: prompt }
                    ],
                    temperature: 0.7
                })
            });

            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error?.message || 'API 请求失败');
            }

            const data = await response.json();
            const content = data.choices[0].message.content;
            
            // 增强的 JSON 解析逻辑
            let quiz = null;
            let parseError = null;
            
            // 方法1: 尝试直接提取和解析 JSON
            try {
                const match = content.match(/\{[\s\S]*\}/);
                if (match) {
                    quiz = JSON.parse(match[0]);
                }
            } catch (err) {
                parseError = err.message;
                console.warn('JSON 解析失败，尝试容错处理:', err.message);
            }
            
            // 方法2: 如果解析失败，尝试修复常见的 JSON 格式问题
            if (!quiz) {
                try {
                    // 修复中文数字为阿拉伯数字
                    let fixedContent = content.replace(/"num":\s*["'](第[一二三四五六七八九十百]+题)["']/g, (match, p1) => {
                        const numMap = {'一':1,'二':2,'三':3,'四':4,'五':5,'六':6,'七':7,'八':8,'九':9,'十':10,'十一':11,'十二':12,'十三':13,'十四':14,'十五':15,'十六':16,'十七':17,'十八':18,'十九':19,'二十':20};
                        let num = 0;
                        if (p1.includes('二十')) {
                            num = 20 + (numMap[p1.replace('二十','').replace('题','')] || 0);
                        } else if (p1.includes('十')) {
                            const parts = p1.replace('题','').replace('第','').split('十');
                            if (parts[0] === '') {
                                num = 10 + (numMap[parts[1]] || 0);
                            } else {
                                num = (numMap[parts[0]] || 1) * 10 + (numMap[parts[1]] || 0);
                            }
                        } else {
                            num = numMap[p1.replace('第','').replace('题','')] || 0;
                        }
                        return '"num": ' + num;
                    });
                    
                    // 移除任何尾随逗号
                    fixedContent = fixedContent.replace(/,(\s*[}\]])/g, '$1');
                    
                    const match = fixedContent.match(/\{[\s\S]*\}/);
                    if (match) {
                        quiz = JSON.parse(match[0]);
                        console.log('容错解析成功');
                    }
                } catch (err) {
                    console.warn('容错解析也失败:', err.message);
                }
            }
            
            // 方法3: 如果还是失败，尝试用正则直接提取题目内容
            if (!quiz) {
                console.warn('尝试正则提取模式');
                quiz = parseQuizWithRegex(content, vocabList);
                if (quiz) {
                    console.log('正则提取成功');
                }
            }
            
            if (quiz) {
                return quiz;
            }
            
            throw new Error(`无法解析题目数据。原始错误: ${parseError || '未知错误'}`);
        }

        // 使用正则表达式提取题目内容（容错模式）
        function parseQuizWithRegex(content, vocabList) {
            try {
                const quiz = {
                    quiz: {
                        translation_cn_to_en: [],
                        translation_en_to_cn: [],
                        no_hint: [],
                        prototype_filling: [],
                        inflection_filling: []
                    },
                    answer: {
                        translation_cn_to_en: [],
                        translation_en_to_cn: [],
                        no_hint: [],
                        prototype_filling: [],
                        inflection_filling: []
                    }
                };
                
                // 匹配题目项：支持 "num": 数字 或 "num": "第X题" 格式
                const questionPattern = /"num"[:：]\s*(?:"(第[一二三四五六七八九十百]+题)"|\d+)[,，]?\s*"question"[:：]\s*"([^"]+)"/gi;
                // 匹配答案项
                const answerPattern = /"num"[:：]\s*(?:"(第[一二三四五六七八九十百]+题)"|\d+)[,，]?\s*"answer"[:：]\s*"([^"]+)"(?:[^}]*"explanation"[:：]\s*"([^"]*)")?/gi;
                
                // 中文数字转阿拉伯数字
                function chineseToNum(str) {
                    const numMap = {'一':1,'二':2,'三':3,'四':4,'五':5,'六':6,'七':7,'八':8,'九':9,'十':10,'十一':11,'十二':12,'十三':13,'十四':14,'十五':15};
                    str = str.replace('第','').replace('题','');
                    if (numMap[str]) return numMap[str];
                    if (str.includes('十')) {
                        const parts = str.split('十');
                        if (parts[0] === '') return 10 + (numMap[parts[1]] || 0);
                        return (numMap[parts[0]] || 1) * 10 + (numMap[parts[1]] || 0);
                    }
                    return parseInt(str) || 0;
                }
                
                // 提取所有题目
                const questions = [];
                let match;
                while ((match = questionPattern.exec(content)) !== null) {
                    const num = match[1] ? chineseToNum(match[1]) : parseInt(match[0].match(/"num"[:：]\s*(\d+)/)?.[1] || 0);
                    questions.push({ num, question: match[2] });
                }
                
                // 提取所有答案
                const answers = [];
                while ((match = answerPattern.exec(content)) !== null) {
                    const num = match[1] ? chineseToNum(match[1]) : parseInt(match[0].match(/"num"[:：]\s*(\d+)/)?.[1] || 0);
                    answers.push({ num, answer: match[2], explanation: match[3] || '' });
                }
                
                // 根据内容特征分类
                let num = 1;
                questions.forEach(q => {
                    const qText = q.question;
                    const ans = answers.find(a => a.num === q.num);
                    
                    if (qText.includes('______') && qText.includes('(')) {
                        // 有括号的填空题
                        if (ans && vocabList.some(v => qText.toLowerCase().includes(v.toLowerCase()))) {
                            quiz.quiz.prototype_filling.push({ num: num, question: qText });
                            quiz.answer.prototype_filling.push({ 
                                num: num, 
                                answer: ans.answer, 
                                explanation: ans.explanation 
                            });
                        } else {
                            quiz.quiz.inflection_filling.push({ num: num, question: qText });
                            quiz.answer.inflection_filling.push({ 
                                num: num, 
                                answer: ans ? ans.answer : '', 
                                explanation: ans ? ans.explanation : '' 
                            });
                        }
                    } else if (qText.includes('______')) {
                        // 无提示填空
                        quiz.quiz.no_hint.push({ num: num, question: qText });
                        quiz.answer.no_hint.push({ 
                            num: num, 
                            answer: ans ? ans.answer : '', 
                            explanation: ans ? ans.explanation : '' 
                        });
                    } else if (/^[a-zA-Z\s\-]+$/.test(qText.trim())) {
                        // 纯英文 -> 英译中
                        quiz.quiz.translation_en_to_cn.push({ num: num, question: qText, type: '英译中' });
                        quiz.answer.translation_en_to_cn.push({ 
                            num: num, 
                            answer: ans ? ans.answer : '' 
                        });
                    } else {
                        // 中文 -> 中译英
                        quiz.quiz.translation_cn_to_en.push({ num: num, question: qText, type: '中译英' });
                        quiz.answer.translation_cn_to_en.push({ 
                            num: num, 
                            answer: ans ? ans.answer : '' 
                        });
                    }
                    num++;
                });
                
                // 只有提取到题目才返回
                if (questions.length > 0) {
                    return quiz;
                }
                return null;
            } catch (err) {
                console.error('正则提取失败:', err);
                return null;
            }
        }

        function renderQuiz(quiz) {
            let questionNum = 1;
            // 生成纯文本题目
            let quizContent = `英语练习题\n`;
            quizContent += `==============\n\n`;
            
            // 中译英翻译题
            if (quiz.quiz.translation_cn_to_en?.length > 0) {
                quizContent += `一、中译英（根据中文写出英文单词）\n`;
                quiz.quiz.translation_cn_to_en.forEach(q => {
                    quizContent += `${questionNum++}. ${q.question}\n`;
                });
                quizContent += `\n`;
            }
            
            // 英译中翻译题
            if (quiz.quiz.translation_en_to_cn?.length > 0) {
                quizContent += `二、英译中（写出下列单词的中文意思）\n`;
                quiz.quiz.translation_en_to_cn.forEach(q => {
                    quizContent += `${questionNum++}. ${q.question}\n`;
                });
                quizContent += `\n`;
            }
            
            // 无提示填空
            if (quiz.quiz.no_hint?.length > 0) {
                quizContent += `三、无提示填空（根据句意填空）\n`;
                quiz.quiz.no_hint.forEach(q => {
                    quizContent += `${questionNum++}. ${q.question}\n`;
                });
                quizContent += `\n`;
            }
            
            // 原型填空
            if (quiz.quiz.prototype_filling?.length > 0) {
                quizContent += `四、原型填空（用所给词的原形填空）\n`;
                quiz.quiz.prototype_filling.forEach(q => {
                    quizContent += `${questionNum++}. ${q.question}\n`;
                });
                quizContent += `\n`;
            }
            
            // 变形填空
            if (quiz.quiz.inflection_filling?.length > 0) {
                quizContent += `五、变形填空（用所给词的适当形式填空）\n`;
                quiz.quiz.inflection_filling.forEach(q => {
                    quizContent += `${questionNum++}. ${q.question}\n`;
                });
            }
            
            quizText.value = quizContent;
            
            // 生成纯文本答案
            let answerNum = 1;
            let answerContent = `参考答案\n`;
            answerContent += `==============\n\n`;
            
            // 中译英答案
            if (quiz.answer.translation_cn_to_en?.length > 0) {
                answerContent += `一、中译英\n`;
                quiz.answer.translation_cn_to_en.forEach(a => {
                    const q = quiz.quiz.translation_cn_to_en?.find(x => x.num === a.num);
                    answerContent += `${answerNum++}. ${q?.question || ''} → ${a.answer}\n`;
                });
                answerContent += `\n`;
            }
            
            // 英译中答案
            if (quiz.answer.translation_en_to_cn?.length > 0) {
                answerContent += `二、英译中\n`;
                quiz.answer.translation_en_to_cn.forEach(a => {
                    const q = quiz.quiz.translation_en_to_cn?.find(x => x.num === a.num);
                    answerContent += `${answerNum++}. ${q?.question || ''} → ${a.answer}\n`;
                });
                answerContent += `\n`;
            }
            
            // 无提示填空答案
            if (quiz.answer.no_hint?.length > 0) {
                answerContent += `三、无提示填空\n`;
                quiz.answer.no_hint.forEach(a => {
                    const q = quiz.quiz.no_hint?.find(x => x.num === a.num);
                    answerContent += `${answerNum++}. ${q?.question || ''} → ${a.answer}`;
                    if (a.explanation) answerContent += ` (${a.explanation})`;
                    answerContent += `\n`;
                });
                answerContent += `\n`;
            }
            
            // 原型填空答案
            if (quiz.answer.prototype_filling?.length > 0) {
                answerContent += `四、原型填空\n`;
                quiz.answer.prototype_filling.forEach(a => {
                    const q = quiz.quiz.prototype_filling?.find(x => x.num === a.num);
                    answerContent += `${answerNum++}. ${q?.question || ''} → ${a.answer}`;
                    if (a.explanation) answerContent += ` (${a.explanation})`;
                    answerContent += `\n`;
                });
                answerContent += `\n`;
            }
            
            // 变形填空答案
            if (quiz.answer.inflection_filling?.length > 0) {
                answerContent += `五、变形填空\n`;
                quiz.answer.inflection_filling.forEach(a => {
                    const q = quiz.quiz.inflection_filling?.find(x => x.num === a.num);
                    answerContent += `${answerNum++}. ${q?.question || ''} → ${a.answer}`;
                    if (a.explanation) answerContent += ` (${a.explanation})`;
                    answerContent += `\n`;
                });
            }
            
            answerText.value = answerContent;
        }

        function updateStep(step) {
            document.querySelectorAll('.step').forEach((el, i) => {
                el.classList.remove('active', 'completed');
                if (i + 1 < step) el.classList.add('completed');
                else if (i + 1 === step) el.classList.add('active');
            });
        }

        function showLoading(text) {
            loadingText.textContent = text;
            loading.style.display = 'block';
        }

        function hideLoading() {
            loading.style.display = 'none';
        }

        function showError(id, msg) {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.style.display = 'block';
        }

        function hideError(id) {
            document.getElementById(id).style.display = 'none';
        }

        function showSuccess(id, msg) {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.style.display = 'block';
        }

        function hideSuccess(id) {
            document.getElementById(id).style.display = 'none';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
