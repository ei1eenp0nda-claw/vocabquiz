<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VocabQuiz - 智能词汇出题</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .upload-area {
            border: 3px dashed #ccc;
            border-radius: 12px;
            padding: 60px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #fafafa;
        }
        .upload-area:hover, .upload-area.dragover {
            border-color: #667eea;
            background: #f0f4ff;
        }
        .upload-area.pasted {
            border-color: #10b981;
            background: #ecfdf5;
        }
        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        .upload-text {
            color: #666;
            font-size: 16px;
            margin-bottom: 10px;
        }
        .upload-hint {
            color: #999;
            font-size: 14px;
        }
        .preview-image {
            max-width: 100%;
            max-height: 400px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }
        .config-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        .config-item {
            display: flex;
            flex-direction: column;
        }
        .config-item.full-width {
            grid-column: 1 / -1;
        }
        label {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
            font-size: 14px;
        }
        input, select, textarea {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        textarea {
            min-height: 80px;
            resize: vertical;
            font-family: monospace;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .btn-secondary {
            background: #f3f4f6;
            color: #333;
        }
        .btn-secondary:hover {
            background: #e5e7eb;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error {
            background: #fee2e2;
            color: #dc2626;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }
        .success {
            background: #d1fae5;
            color: #059669;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }
        .vocab-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 15px;
        }
        .vocab-tag {
            background: #e0e7ff;
            color: #4338ca;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
        }
        .quiz-section {
            margin-top: 30px;
        }
        .quiz-type {
            margin-bottom: 25px;
        }
        .quiz-type h3 {
            color: #667eea;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 2px solid #e0e7ff;
        }
        .question {
            background: #f9fafb;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .question-num {
            display: inline-block;
            background: #667eea;
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            text-align: center;
            line-height: 24px;
            font-size: 12px;
            margin-right: 10px;
        }
        .answer-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px dashed #e0e0e0;
        }
        .answer-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .answer-text {
            font-weight: 600;
            color: #059669;
        }
        .explanation {
            font-size: 13px;
            color: #666;
            margin-top: 5px;
        }
        .hidden { display: none !important; }
        .toggle-answer {
            text-align: center;
            margin: 20px 0;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            background: #f9fafb;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .stat-item {
            text-align: center;
        }
        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #667eea;
        }
        .stat-label {
            font-size: 12px;
            color: #666;
        }
        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        .step {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #999;
        }
        .step.active {
            color: #667eea;
            font-weight: 600;
        }
        .step.completed {
            color: #10b981;
        }
        .step-num {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }
        .step.active .step-num {
            background: #667eea;
            color: white;
        }
        .step.completed .step-num {
            background: #10b981;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 VocabQuiz</h1>
        
        <!-- 步骤指示器 -->
        <div class="card step-indicator">
            <div class="step active" id="step1">
                <div class="step-num">1</div>
                <span>上传图片</span>
            </div>
            <div class="step" id="step2">
                <div class="step-num">2</div>
                <span>提取词汇</span>
            </div>
            <div class="step" id="step3">
                <div class="step-num">3</div>
                <span>生成题目</span>
            </div>
        </div>

        <!-- API 配置 -->
        <div class="card">
            <h3 style="margin-bottom: 15px;">⚙️ API 配置</h3>
            <div class="config-section">
                <div class="config-item full-width">
                    <label>豆包 API Key</label>
                    <input type="password" id="apiKey" placeholder="输入你的豆包 API Key">
                </div>
                <div class="config-item">
                    <label>模型（OCR）</label>
                    <select id="visionModel">
                        <option value="doubao-seed-1-6-vision-250815">doubao-vision</option>
                    </select>
                </div>
                <div class="config-item">
                    <label>模型（生成）</label>
                    <select id="llmModel">
                        <option value="doubao-1-5-lite-32k-250115">doubao-lite-32k</option>
                    </select>
                </div>
            </div>
            <p style="font-size: 12px; color: #999; margin-top: 10px;">
                💡 提示：在 <a href="https://console.volcengine.com/ark/" target="_blank">火山引擎</a> 获取 API Key
            </p>
        </div>

        <!-- 上传区域 -->
        <div class="card" id="uploadCard">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📋</div>
                <div class="upload-text">粘贴或点击上传图片</div>
                <div class="upload-hint">支持 Ctrl+V 粘贴截图，或拖拽图片到此处</div>
                <input type="file" id="fileInput" accept="image/*" style="display: none;">
            </div>
            <img id="previewImage" class="preview-image" alt="预览">
            <div id="uploadError" class="error"></div>
            <div id="uploadSuccess" class="success"></div>
            
            <div class="actions" style="margin-top: 20px;">
                <button class="btn" id="extractBtn" disabled>
                    🔍 提取词汇
                </button>
                <button class="btn btn-secondary hidden" id="resetBtn">
                    🔄 重新上传
                </button>
            </div>
        </div>

        <!-- 词汇展示 -->
        <div class="card hidden" id="vocabCard">
            <h3 style="margin-bottom: 15px;">📚 识别到的词汇</h3>
            <div class="vocab-list" id="vocabList"></div>
            
            <div style="margin-top: 20px;">
                <label>难度选择</label>
                <select id="difficulty" style="margin-top: 5px;">
                    <option value="easy">初中水平</option>
                    <option value="medium" selected>高中水平（高考）</option>
                    <option value="hard">四级以上</option>
                </select>
            </div>
            
            <div class="actions" style="margin-top: 20px;">
                <button class="btn" id="generateBtn">
                    ✨ 生成练习题
                </button>
            </div>
        </div>

        <!-- 加载状态 -->
        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <div id="loadingText">正在处理...</div>
        </div>

        <!-- 练习题 -->
        <div class="card hidden" id="quizCard">
            <h2 style="text-align: center; margin-bottom: 20px;">📝 练习题</h2>
            
            <div class="stats" id="stats"></div>
            
            <div class="quiz-section" id="quizSection"></div>
            
            <div class="toggle-answer">
                <button class="btn btn-secondary" id="toggleAnswerBtn">
                    👁️ 显示答案
                </button>
            </div>
            
            <div class="answer-section hidden" id="answerSection"></div>
            
            <div class="actions" style="margin-top: 30px;">
                <button class="btn" id="newQuizBtn">
                    🔄 再做一组
                </button>
                <button class="btn btn-secondary" id="startOverBtn">
                    🏠 重新开始
                </button>
            </div>
        </div>
    </div>

    <script>
        // 全局状态
        let currentImage = null;
        let extractedVocab = [];
        let currentQuiz = null;

        // DOM 元素
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const previewImage = document.getElementById('previewImage');
        const extractBtn = document.getElementById('extractBtn');
        const resetBtn = document.getElementById('resetBtn');
        const vocabCard = document.getElementById('vocabCard');
        const vocabList = document.getElementById('vocabList');
        const generateBtn = document.getElementById('generateBtn');
        const quizCard = document.getElementById('quizCard');
        const loading = document.getElementById('loading');
        const loadingText = document.getElementById('loadingText');

        // 点击上传
        uploadArea.addEventListener('click', () => fileInput.click());
        
        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) {
                handleImage(e.target.files[0]);
            }
        });

        // 拖拽上传
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                handleImage(file);
            }
        });

        // 粘贴上传
        document.addEventListener('paste', (e) => {
            const items = e.clipboardData.items;
            for (let item of items) {
                if (item.type.startsWith('image/')) {
                    const file = item.getAsFile();
                    handleImage(file);
                    uploadArea.classList.add('pasted');
                    setTimeout(() => uploadArea.classList.remove('pasted'), 1000);
                    break;
                }
            }
        });

        // 处理图片
        function handleImage(file) {
            currentImage = file;
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImage.src = e.target.result;
                previewImage.style.display = 'block';
                extractBtn.disabled = false;
                resetBtn.classList.remove('hidden');
                showSuccess('uploadSuccess', '图片已加载，点击"提取词汇"继续');
            };
            reader.readAsDataURL(file);
        }

        // 重置
        resetBtn.addEventListener('click', () => {
            currentImage = null;
            previewImage.src = '';
            previewImage.style.display = 'none';
            extractBtn.disabled = true;
            resetBtn.classList.add('hidden');
            hideError('uploadError');
            hideSuccess('uploadSuccess');
        });

        // 提取词汇
        extractBtn.addEventListener('click', async () => {
            const apiKey = document.getElementById('apiKey').value.trim();
            if (!apiKey) {
                showError('uploadError', '请先填写 API Key');
                return;
            }

            showLoading('正在识别图片中的词汇...');
            
            try {
                const base64Image = await fileToBase64(currentImage);
                const vocab = await extractVocab(base64Image, apiKey);
                
                extractedVocab = vocab;
                renderVocabList(vocab);
                
                vocabCard.classList.remove('hidden');
                updateStep(2);
                
                // 滚动到词汇卡片
                vocabCard.scrollIntoView({ behavior: 'smooth' });
            } catch (err) {
                showError('uploadError', err.message);
            } finally {
                hideLoading();
            }
        });

        // 生成练习题
        generateBtn.addEventListener('click', async () => {
            const apiKey = document.getElementById('apiKey').value.trim();
            const difficulty = document.getElementById('difficulty').value;
            
            if (extractedVocab.length === 0) {
                alert('没有可生成题目的词汇');
                return;
            }

            showLoading('正在生成练习题...');
            
            try {
                const quiz = await generateQuiz(extractedVocab, difficulty, apiKey);
                currentQuiz = quiz;
                renderQuiz(quiz);
                
                quizCard.classList.remove('hidden');
                updateStep(3);
                
                // 滚动到题目卡片
                quizCard.scrollIntoView({ behavior: 'smooth' });
            } catch (err) {
                alert('生成失败: ' + err.message);
            } finally {
                hideLoading();
            }
        });

        // 显示/隐藏答案
        document.getElementById('toggleAnswerBtn').addEventListener('click', () => {
            const answerSection = document.getElementById('answerSection');
            const btn = document.getElementById('toggleAnswerBtn');
            
            if (answerSection.classList.contains('hidden')) {
                answerSection.classList.remove('hidden');
                btn.textContent = '🙈 隐藏答案';
            } else {
                answerSection.classList.add('hidden');
                btn.textContent = '👁️ 显示答案';
            }
        });

        // 再做一组
        document.getElementById('newQuizBtn').addEventListener('click', () => {
            generateBtn.click();
        });

        // 重新开始
        document.getElementById('startOverBtn').addEventListener('click', () => {
            location.reload();
        });

        // 工具函数
        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => {
                    const base64 = reader.result.split(',')[1];
                    resolve(base64);
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        async function extractVocab(base64Image, apiKey) {
            const response = await fetch('https://ark.cn-beijing.volces.com/api/v3/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: document.getElementById('visionModel').value,
                    messages: [
                        {
                            role: 'system',
                            content: '你是一个OCR识别专家，专门识别图片中加粗的英文词汇。'
                        },
                        {
                            role: 'user',
                            content: [
                                {
                                    type: 'text',
                                    text: '找出图片中所有加粗的英文单词和词组，返回JSON数组格式：["word1", "word2", ...]。只返回JSON数组，不要有其他文字。'
                                },
                                {
                                    type: 'image_url',
                                    image_url: {
                                        url: `data:image/png;base64,${base64Image}`
                                    }
                                }
                            ]
                        }
                    ],
                    temperature: 0.1
                })
            });

            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error?.message || 'API 请求失败');
            }

            const data = await response.json();
            const content = data.choices[0].message.content;
            
            // 提取 JSON 数组
            const match = content.match(/\[[\s\S]*?\]/);
            if (match) {
                return JSON.parse(match[0]);
            }
            throw new Error('无法解析词汇列表');
        }

        async function generateQuiz(vocabList, difficulty, apiKey) {
            const vocabStr = vocabList.join(', ');
            
            const difficultyDesc = {
                easy: '初中水平，简单',
                medium: '高中水平，高考难度',
                hard: '四级以上，较难'
            }[difficulty];

            const prompt = `基于以下词汇出英语练习题：${vocabStr}
难度：${difficultyDesc}

【题型要求】
1. 翻译题5题（英译中3题 + 中译英2题）
2. 形式填空4题（用括号词的变形填空）
3. 无提示填空1题（固定搭配，无括号提示）

【形式填空 - 好示例】
✓ The weather is getting ______ (bad). → worse（比较级变形）
✓ She ______ (go) to school yesterday. → went（过去式变形）
✓ The book ______ (write) by Lu Xun. → was written（被动语态）
✓ I look forward to ______ (hear) from you. → hearing（固定搭配）

【规则说明】
- 4题形式填空中，最多1题可以填原形（如情态动词后）
- 其他3题必须考察变形：时态/语态/比较级/非谓语等

【兜底策略】
如果词汇不适合出题，优先使用派生词（如 success → successful）

输出JSON格式：
{
  "quiz": {
    "translation": [{"num": 1, "question": "英文单词", "type": "英译中"}],
    "form_filling": [{"num": 6, "question": "句子______填空（提示词）", "type": "形式填空"}],
    "no_hint": [{"num": 10, "question": "句子______填空", "type": "无提示填空"}]
  },
  "answer": {
    "translation": [{"num": 1, "answer": "中文意思"}],
    "form_filling": [{"num": 6, "answer": "变形后答案", "explanation": "解析"}],
    "no_hint": [{"num": 10, "answer": "答案", "explanation": "解析"}]
  },
  "stats": {"total": 10, "translation_count": 5, "form_filling_count": 4, "no_hint_count": 1}
}

只返回JSON，不要其他文字。`;

            const response = await fetch('https://ark.cn-beijing.volces.com/api/v3/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: document.getElementById('llmModel').value,
                    messages: [
                        {
                            role: 'system',
                            content: '你是一个专业的英语教师，擅长根据词汇出高质量的练习题。'
                        },
                        {
                            role: 'user',
                            content: prompt
                        }
                    ],
                    temperature: 0.7
                })
            });

            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error?.message || 'API 请求失败');
            }

            const data = await response.json();
            const content = data.choices[0].message.content;
            
            // 提取 JSON
            const match = content.match(/\{[\s\S]*\}/);
            if (match) {
                return JSON.parse(match[0]);
            }
            throw new Error('无法解析题目数据');
        }

        function renderVocabList(vocab) {
            vocabList.innerHTML = vocab.map(v => 
                `<span class="vocab-tag">${escapeHtml(v)}</span>`
            ).join('');
        }

        function renderQuiz(quiz) {
            // 统计数据
            const stats = quiz.stats || {};
            document.getElementById('stats').innerHTML = `
                <div class="stat-item">
                    <div class="stat-value">${stats.total || 10}</div>
                    <div class="stat-label">总题数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">${stats.translation_count || 5}</div>
                    <div class="stat-label">翻译题</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">${stats.form_filling_count || 4}</div>
                    <div class="stat-label">形式填空</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">${stats.no_hint_count || 1}</div>
                    <div class="stat-label">无提示填空</div>
                </div>
            `;

            // 题目
            const quizSection = document.getElementById('quizSection');
            let html = '';

            // 翻译题
            if (quiz.quiz.translation && quiz.quiz.translation.length > 0) {
                html += '<div class="quiz-type"><h3>一、翻译题</h3>';
                quiz.quiz.translation.forEach(q => {
                    html += `<div class="question">
                        <span class="question-num">${q.num}</span>
                        <span>${escapeHtml(q.question)}</span>
                    </div>`;
                });
                html += '</div>';
            }

            // 形式填空
            if (quiz.quiz.form_filling && quiz.quiz.form_filling.length > 0) {
                html += '<div class="quiz-type"><h3>二、形式填空（用所给词的适当形式填空）</h3>';
                quiz.quiz.form_filling.forEach(q => {
                    html += `<div class="question">
                        <span class="question-num">${q.num}</span>
                        <span>${escapeHtml(q.question)}</span>
                    </div>`;
                });
                html += '</div>';
            }

            // 无提示填空
            if (quiz.quiz.no_hint && quiz.quiz.no_hint.length > 0) {
                html += '<div class="quiz-type"><h3>三、无提示填空</h3>';
                quiz.quiz.no_hint.forEach(q => {
                    html += `<div class="question">
                        <span class="question-num">${q.num}</span>
                        <span>${escapeHtml(q.question)}</span>
                    </div>`;
                });
                html += '</div>';
            }

            quizSection.innerHTML = html;

            // 答案
            const answerSection = document.getElementById('answerSection');
            let answerHtml = '<h3 style="margin-bottom: 15px;">📖 参考答案</h3>';

            // 翻译题答案
            if (quiz.answer.translation && quiz.answer.translation.length > 0) {
                answerHtml += '<div style="margin-bottom: 20px;"><h4 style="color: #667eea; margin-bottom: 10px;">一、翻译题</h4>';
                quiz.answer.translation.forEach(a => {
                    answerHtml += `<div class="answer-item">
                        <span>${a.num}. ${escapeHtml(quiz.quiz.translation.find(q => q.num === a.num)?.question || '')}</span>
                        <span class="answer-text">${escapeHtml(a.answer)}</span>
                    </div>`;
                });
                answerHtml += '</div>';
            }

            // 形式填空答案
            if (quiz.answer.form_filling && quiz.answer.form_filling.length > 0) {
                answerHtml += '<div style="margin-bottom: 20px;"><h4 style="color: #667eea; margin-bottom: 10px;">二、形式填空</h4>';
                quiz.answer.form_filling.forEach(a => {
                    answerHtml += `<div class="answer-item" style="flex-direction: column; align-items: flex-start;">
                        <div style="display: flex; justify-content: space-between; width: 100%;">
                            <span>${a.num}. ${escapeHtml(quiz.quiz.form_filling.find(q => q.num === a.num)?.question || '')}</span>
                            <span class="answer-text">${escapeHtml(a.answer)}</span>
                        </div>
                        ${a.explanation ? `<div class="explanation">💡 ${escapeHtml(a.explanation)}</div>` : ''}
                    </div>`;
                });
                answerHtml += '</div>';
            }

            // 无提示填空答案
            if (quiz.answer.no_hint && quiz.answer.no_hint.length > 0) {
                answerHtml += '<div><h4 style="color: #667eea; margin-bottom: 10px;">三、无提示填空</h4>';
                quiz.answer.no_hint.forEach(a => {
                    answerHtml += `<div class="answer-item" style="flex-direction: column; align-items: flex-start;">
                        <div style="display: flex; justify-content: space-between; width: 100%;">
                            <span>${a.num}. ${escapeHtml(quiz.quiz.no_hint.find(q => q.num === a.num)?.question || '')}</span>
                            <span class="answer-text">${escapeHtml(a.answer)}</span>
                        </div>
                        ${a.explanation ? `<div class="explanation">💡 ${escapeHtml(a.explanation)}</div>` : ''}
                    </div>`;
                });
                answerHtml += '</div>';
            }

            answerSection.innerHTML = answerHtml;
        }

        function updateStep(step) {
            document.querySelectorAll('.step').forEach((el, i) => {
                el.classList.remove('active', 'completed');
                if (i + 1 < step) {
                    el.classList.add('completed');
                } else if (i + 1 === step) {
                    el.classList.add('active');
                }
            });
        }

        function showLoading(text) {
            loadingText.textContent = text;
            loading.style.display = 'block';
        }

        function hideLoading() {
            loading.style.display = 'none';
        }

        function showError(id, msg) {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.style.display = 'block';
        }

        function hideError(id) {
            document.getElementById(id).style.display = 'none';
        }

        function showSuccess(id, msg) {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.style.display = 'block';
        }

        function hideSuccess(id) {
            document.getElementById(id).style.display = 'none';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
